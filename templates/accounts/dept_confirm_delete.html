{% extends 'base.html' %}
{% block title %}Delete Department{% endblock %}
{% block page_title %}Delete Department{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
<div class="card" style="text-align:center;">
  <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
  <h2 style="font-size:18px;font-weight:800;color:var(--brand-blue);margin-bottom:8px;">Delete "{{ dept.name }}"?</h2>
  <p class="text-sm text-muted">This cannot be undone.</p>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
    <a href="{% url 'accounts:dept_list' %}" class="btn btn-outline">Cancel</a>
  </div>
</div>
</div>
{% endblock %}
