{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
 <meta name="theme-color" content="#000000">
 <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
 <link rel="stylesheet" href="{% static 'css/style.css' %}">
 <title>Sign In - The Ambassador</title>
 <style>
 
 </style>
</head>
<body>
<div class="login-wrap">

 <div class="brand">
 <div class="brand-mark">
    <img class="brand-mark" src="{% static 'img/logo.png' %}" alt="B">
 </div>
 <h1>The Ambassador</h1>
 <p>Management Platform</p>
 </div>

 <div class="login-card">
 <h2>Sign In</h2>

 {% if form.errors %}
 <div class="alert alert-error">Invalid username or password. Please try again.</div>
 {% endif %}

 {% for message in messages %}
 <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
 {% endfor %}

 <form method="post">
 {% csrf_token %}
 <div class="form-group">
 <label class="form-label" for="id_username">Username</label>
 <input type="text" name="username" id="id_username" class="form-control"
 placeholder="Enter your username" autocomplete="username" autofocus required>
 </div>
 <div class="form-group">
 <label class="form-label" for="id_password">Password</label>
 <input type="password" name="password" id="id_password" class="form-control"
 placeholder="Enter your password" autocomplete="current-password" required>
 </div>
 <input type="hidden" name="next" value="{{ next }}">
 <button type="submit" class="btn-login">Sign In</button>
 </form>
 </div>

 <div class="login-footer">The Ambassador &copy; 2026</div>
</div>
</body>
</html>
