{% extends 'base.html' %}
{% block title %}Delete Role{% endblock %}
{% block page_title %}Delete Role{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
<div class="card">
 <div style="text-align:center;padding:16px 0;">
 <div style="font-size:48px;margin-bottom:12px;"></div>
 <h2 style="font-size:18px;font-weight:800;color:#aaaaaa;margin-bottom:8px;">Delete "{{ role.name }}"?</h2>
 <p class="text-muted text-sm">This action cannot be undone.</p>
 </div>
 <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;">
 <form method="post">
 {% csrf_token %}
 <button type="submit" class="btn btn-danger">Yes, Delete</button>
 </form>
 <a href="{% url 'accounts:role_list' %}" class="btn btn-outline">Cancel</a>
 </div>
</div>
</div>
{% endblock %}
