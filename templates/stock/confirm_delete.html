{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
<div class="card" style="text-align:center;">
 <div style="font-size:48px;margin-bottom:12px;"></div>
 <h2 style="font-size:18px;font-weight:800;color:#f5c800;margin-bottom:8px;">{{ title }}</h2>
 <p class="text-sm text-muted">{{ message }}</p>
 <p class="text-sm" style="margin-top:8px;color:var(--danger);">This cannot be undone.</p>
 <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">
 <form method="post">{% csrf_token %}
 <button type="submit" class="btn btn-danger">Yes, Delete</button>
 </form>
 <a href="{% url back_url %}" class="btn btn-outline">Cancel</a>
 </div>
</div>
</div>
{% endblock %}
